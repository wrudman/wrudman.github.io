<script>
    var papers = [
    {"id": "isoscore", "title": "IsoScore", "venue": "ACL2022", "url": "https://arxiv.org/pdf/2108.07344", "root_node": 1, "root_name": "Representational Geometry\n2021-Present", "root_color": "#FA9189", "coauthors": ["Nate Gillman, Taylor Rayne, Carsten Eickhoff"], "full_title": "IsoScore: Measuring the Uniformity of Embedding Space Utilization", "summary": "My first conference paper! We develop IsoScore, the first metric capable of accurately measure isotropy, i.e., the uniformity of variance in embedding space. We show that existing methods for measuing isotorpy as fundamentally flawed and only IsoScore reliably measures isotropy."},     
    {"id": "outlier_dims", "title": "Outlier Dims", "venue": "EMNLP 2023", "url": "https://arxiv.org/pdf/2310.17715", "parent": "isoscore", "coauthors": ["Catherine Chen", "Carsten Eickhoff"], "full_title": "Outlier Dimensions Encode Task-Specific Knowledge", "summary": "Representations from large language models (LLMs) are known to be dominated by a small subset of dimensions with exceedingly high variance. Previous works have argued that although ablating these outlier dimensions in LLM representations hurts downstream performance, outlier dimensions are detrimental to the representational quality of embeddings. In this study, we investigate how fine-tuning impacts outlier dimensions and show that 1) outlier dimensions that occur in pre-training persist in fine-tuned models and 2) a single outlier dimension can complete downstream tasks with a minimal error rate. Our results suggest that outlier dimensions can encode crucial task-specific knowledge and that the value of a representation in a single outlier dimension drives downstream model decisions."},
    {"id": "garden_path", "title": "Garden Paths", "venue": "BlackboxNLP 2022", "url": "https://arxiv.org/abs/2205.12302", "parent": "outlier_dims", "coauthors": ["William Jurayj", "Carsten Eickhoff"], "full_title": "Garden-Path Traversal in GPT-2", "summary": "We present a collection of methods to analyze the hidden states of GPT-2 and use the model's navigation of garden path sentences as a case study."},
    {"id": "istar", "title": "I-STAR", "venue": "ICLR 2024", "url": "https://arxiv.org/abs/2305.19358", "parent": "outlier_dims", "coauthors": ["Carsten Eickhoff"], "full_title": "Stable Anisotropic Regularization", "summary": "We propose I-STAR: IsoScore*-based STable Anisotropic Regularization, a novel regularization method that can be used to increase or decrease levels of isotropy in embedding space during training."},
    {"id": "trim", "title": "TRIM", "venue": "Under Review", "url": "https://arxiv.org/pdf/2505.16743", "parent": "istar", "coauthors": ["Florentin Beck", "Carsten Eickhoff"], "full_title": "TRIM: Achieving Extreme Sparsity with Targeted Row-wise Iterative Metric-driven Pruning", "summary": "This work introduces TRIM, a novel approach that applies varying sparsity ratios to individual output dimensions within each layer."}, 
    {"id": "uts", "title": "Unified Topological Signatures", "venue": "Under Review", "url": "https://arxiv.org/abs/2511.22150", "parent": "trim", "coauthors": ["Florian Rottach", "Bastian Rieck", "Harrisen Scells", "Carsten Eickhoff"], "full_title": "From Topology to Retrieval: Decoding Embedding Spaces with Unified Signatures", "summary": "We show that while individual geometric and topological metrics are often redundant and insufficient for distinguishing text embedding spaces, our Unified Topological Signatures framework provides a holistic characterization that reveals model properties, architectural similarities, and predicts downstream retrieval performance.", "children": []},

    {"id": "notice", "title": "NOTICE", "venue": "NAACL 2025", "url": "https://arxiv.org/pdf/2406.16320", "root_node": 1, "root_name": "Multimodal Mech Interp\n2024-Present", "root_color": "#FFE699", "coauthors": ["Michal Golovanevsky", "Vedant Palit", "Ritambhara Singh", "Carsten Eickhoff"], "full_title": "What Do VLMs NOTICE? A Mechanistic Interpretability Pipeline for Gaussian-Noise-free Text-Image Corruption and Evaluation", "summary": "We introduce NOTICE, the first Noise-free Text-Image Corruption and Evaluation pipeline for mechanistic interpretability in VLMs."},
    {"id": "pvp", "title": "Visual CounterFact", "venue": "EMNLP 2025", "url": "https://arxiv.org/abs/2505.17127", "parent": "notice", "coauthors": ["Michal Golovanevsky", "Vedant Palit", "Michael Lepori", "Amir Bar", "Ritambhara Singh", "Carsten Eickhoff"], "full_title": "Pixels Versus Priors: Controlling Knowledge Priors in Vision-Language Models through Visual Counterfacts", "summary": "We introduce Visual CounterFact, a dataset of visually-realistic counterfactuals that put world knowledge priors into direct conflict with visual input."},    
    {"id": "app", "title": "APP", "venue": "BlackboxNLP 2025", "url": "https://arxiv.org/pdf/2511.05442", "parent": "notice", "coauthors": ["Frauke Andersen", "Ruochen Zhang", "Carsten Eickhoff"], "full_title": "APP: Accelerated Path Patching with Task-Specific Pruning", "summary": "We propose Accelerated Path Patching (APP), a hybrid approach leveraging contrastive attention head pruning to drastically reduce the search space of circuit discovery methods."},
    {"id": "shape_blind", "title": "Forgotten Polygons", "venue": "ACL 2025", "url": "https://arxiv.org/abs/2502.15969", "parent": "app", "coauthors": ["Michal Golovanevsky", "Vedant Palit", "Yann Lecun", "Amir Bar", "Ritambhara Singh", "Carsten Eickhoff"], "full_title": "Forgotten Polygons: Multimodal Large Language Models are Shape-Blind", "summary": "Our findings reveal fundamental shortcomings in shape recognition, with top models achieving under 50% accuracy in identifying regular polygons."},
    {"id": "mechanism_pih", "title": "Prompt-Induced Hallucinations", "venue": "ACL 2026", "url": "https://arxiv.org/abs/2601.05201", "parent": "shape_blind", "coauthors": ["Michal Golovanevsky", "Dana Arad", "Yonatan Belinkov", "Ritambhara Singh", "Carsten Eickhoff", "Kyle Mahowald"], "full_title": "Mechanisms of Prompt-Induced Hallucination in Vision-Language Models", "summary": "Through mechanistic analysis of three VLMs, we identify a small set of attention heads whose ablation substantially reduces prompt-induced hallucinations (PIH) by at least 40% without additional training."},
    {"id": "apple_introspection", "title": "VLM-Introspection", "venue": "Under Review", "is_left_child": 1, "url": "https://arxiv.org/pdf/2604.06422", "parent": "pvp", "coauthors": ["Jonathan Nemitz", "Carsten Eickhoff", "Kyle Mahowald", "Michal Golovanevsky"], "full_title": "When to Call an Apple Red: Humans Follow Introspective Rules, VLMs Don’t", "summary": "This paper investigates whether Vision-Language Models can reliably introspect on their own decision rules, using a controlled color-attribution task where both VLMs and humans first state how much pixel-level color coverage an object needs to receive a given color label, then make actual attribution decisions that can be checked against those stated rules. The findings show that VLMs systematically violate their own introspective rules (e.g., GPT-5-mini does so in nearly 60% of strong-prior cases) despite being excellent at estimating color coverage, whereas humans remain faithful, suggesting that VLM introspective self-knowledge is miscalibrated in ways that don't mirror human cognition, with direct implications for high-stakes deployment."},

     {"id": "vesta", "title": "VESTA", "venue": "Under Review", "url": "https://arxiv.org/pdf/2606.00384", "root_node": 1, "root_name": "AI for Science\n2025-Present", "root_color": "#1D4ED8", "coauthors": ["Abhishek Divekar", "Kanishk Jain", "Sebastian Joseph", "Stella S. R. Offner", "Matthew Lease", "Kyle Mahowald", "Greg Durrett", "Junyi Jessy Li"], "full_title": "VESTA: Visual Exploration with Statistical Tool Agents", "summary": "This paper introduces VESTA (Visual Exploration with Statistical Tool Agents), a framework that equips vision-language models with a dynamically growing toolkit to guide statistical model fitting through data transformations, hypothesis-driven visualizations, and statistical tests, actively exploring data by selecting or creating diagnostic tools that accumulate for later reuse. Evaluated on DAWN, a new benchmark spanning distribution fitting and time series modeling up to real-world astronomy tasks, VESTA's dynamic tool creation outperforms prior agentic pipelines, with the largest gains on complex and domain-specific tasks, and produces substantially more sophisticated tools than existing systems."},
     {"id": "mqud", "title": "Multimodal QUD", "venue": "Under Review", "url": "https://arxiv.org/abs/2604.23733", "parent": "vesta", "coauthors": ["Yating Wu", "Venkata S Govindarajan", "Alexandros G. Dimakis", "Junyi Jessy Li"], "full_title": "Multimodal QUD: Inquisitive Questions from Scientific Figures", "summary": "We extend the linguistic theory of Questions Under Discussion (QUD) from text-only to multimodal, where implicit questions are raised and resolved as discourse progresses across both a scientific figure and its surrounding paper context. We present MQUD, a dataset of research papers in which such inquisitive questions are made explicit and annotated by the original authors, and show that fine-tuning a VLM on MQUD shifts the model from generic low-level visual questions to content-specific, visually grounded questions requiring high-level multimodal reasoning."}, 
     {"id": "morph_shortcuts", "title": "Morphological Shortcuts", "venue": "Under Review", "url": "https://arxiv.org/abs/2606.05616", "parent": "vesta", "coauthors": ["Kaijie Mo", "Thomas Yang", "Chantal Shaib", "Qing Yao", "Ramez Kouzy", "Kanishka Misra", "Byron C. Wallace", "Junyi Jessy Li"], "full_title": "What's in a Name? Morphological Shortcuts by LLMs in Pharmacology", "summary": "We present a behavioral and mechanistic study of LLM \"affix heuristics\" in pharmacology. Using fictitious drug names built from real affixes (e.g., wugcillin), we show that affix signals alone elicit class-level pharmacological responses, and we introduce a framework for identifying whether a model's drug semantics are driven by the affix, the stem, or the full drug name. Applied across 653 drugs, the framework reveals that models often induce drug meaning primarily through affix cues yet rarely indicate this reliance, sometimes incorrectly conflating properties among affix-sharing drugs. Activation patching localizes this behavior to early-mid layers, showing that morphological shortcuts pose a subtle but measurable safety risk."},
     {"id": "vlm_fragility", "title": "VLM Fragility", "venue": "Under Review", "url": "https://arxiv.org/abs/2604.09841", "parent": "morph_shortcuts", "coauthors": ["Oliver McLaughlin", "Daniel Shubin", "Carsten Eickhoff", "Ritambhara Singh", "Michal Golovanevsky"], "full_title": "Is There Knowledge Left to Extract? Evidence of Fragility in Medically Fine-Tuned Vision-Language Models", "summary": "We evaluate four paired open-source VLMs (LLaVA vs. LLaVA-Med; Gemma vs. MedGemma) across four medical imaging tasks of increasing difficulty, and find that performance degrades toward near-random levels as difficulty rises, indicating limited clinical reasoning. Medical fine-tuning provides no consistent advantage, and models are highly sensitive to prompt formulation. A description-based pipeline—where models generate image descriptions that a text-only model uses for diagnosis—recovers only limited additional signal, and analysis of vision encoder embeddings shows failures stem from both weak visual representations and downstream reasoning. Overall, medical VLM performance is fragile, prompt-dependent, and not reliably improved by domain-specific fine-tuning."}
    ];

    build_garden(papers);
</script>
